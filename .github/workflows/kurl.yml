name: kurl CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "app/**"
      - ".github/workflows/kurl.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "app/**"
      - ".github/workflows/kurl.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for syntax errors
        run: find . -name "*.py" -not -path "./.venv/*" -not -path "./__pycache__/*" -not -path "./python_modules/*" | xargs python -m py_compile

  deploy-api:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pywrangler
        run: |
          pip install uv
          uv tool install workers-py

      - name: Deploy to Cloudflare Workers
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pywrangler deploy

  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-api]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Test endpoints
        run: |
          set -e
          WORKER_URL="${{ secrets.KURL_WORKER_URL }}"
          AUTH="X-API-Key: ${{ secrets.KURL_API_KEY }}"

          echo "Testing GET /api (public)..."
          curl -sS "$WORKER_URL/api" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='OK', f'Unexpected: {d}'; print('API info passed')"

          echo "Testing GET /api/healthz (public)..."
          curl -sS "$WORKER_URL/api/healthz" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='healthy', f'Unexpected: {d}'; print('Health check passed')"

          echo "Testing GET /api/readyz (auth)..."
          curl -sS -H "$AUTH" "$WORKER_URL/api/readyz" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status'] in ('ready','degraded'), f'Unexpected: {d}'; print('Readiness check passed')"

          echo "Testing POST /api/kurl (auth)..."
          curl -sS -X POST -H "$AUTH" -H "Content-Type: application/json" -d '{"url":"https://open.spotify.com/track/4cOdK2wGLETKBW3PvgPWqT","target_platform":"deezer"}' "$WORKER_URL/api/kurl" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='success', f'Unexpected: {d}'; print('Kurl endpoint passed')"

          echo "Testing auth enforcement (no key should 401)..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/api/kurl" -X POST -H "Content-Type: application/json" -d '{"url":"https://example.com","target_platform":"spotify"}')
          [ "$STATUS" = "401" ] && echo "Auth enforcement passed" || (echo "Expected 401, got $STATUS" && exit 1)

          echo "All smoke tests passed"

  deploy-web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter web
        working-directory: app
        run: flutter build web --release --dart-define=KURL_API_KEY=${{ secrets.KURL_API_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy app/build/web --project-name kurl-web
