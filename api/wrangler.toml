name = "kurl-api"
main = "src/entry.py"
compatibility_date = "2026-04-26"
compatibility_flags = ["python_workers"]
find_additional_modules = false

[assets]
directory = "src/public"

# KV binding — add via dashboard if CLI auth lacks perms
# [[kv_namespaces]]
# binding = "CACHE"
# id = "6992aaa34a2b4899a4f43305bb5c63d5"

[[d1_databases]]
binding = "kurl"
database_name = "kurl"
database_id = "32af40a9-051b-4e7b-9a11-eca5e1ce7440"

[[rules]]
type = "Text"
globs = ["src/public/**/*.html", "src/public/**/*.css", "src/public/**/*.js", "src/public/**/*.json", "src/public/**/*.ico"]
fallthrough = true

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
